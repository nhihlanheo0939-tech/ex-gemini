<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Prompt Opener</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="card">
    <header class="header">
      <img src="icon128.png" alt="Gemini Prompt Opener" class="logo" width="44" height="44">
      <div class="title-container">
        <h1>Gemini Prompt Opener</h1>
        <p class="subtitle">Chọn topic để mở prompt</p>
      </div>
    </header>

    <p class="prompt-question" id="prompt-question">Bạn muốn mở Topic nào?</p>

    <div class="actions" role="group" aria-labelledby="prompt-question">
      <div class="topic-grid">
        <button type="button" class="btn topic-btn" data-topic="1" id="btn-topic-1">
          <span class="btn-title">Topic 1</span>
          <span class="btn-meta">4 prompt</span>
        </button>

        <button type="button" class="btn topic-btn topic-btn-alt" data-topic="2" id="btn-topic-2">
          <span class="btn-title">Topic 2</span>
          <span class="btn-meta">4 prompt</span>
        </button>

        <button type="button" class="btn topic-btn" data-topic="3" id="btn-topic-3">
          <span class="btn-title">Topic 3</span>
          <span class="btn-meta">4 prompt</span>
        </button>

        <button type="button" class="btn topic-btn topic-btn-alt" data-topic="4" id="btn-topic-4">
          <span class="btn-title">Topic 4</span>
          <span class="btn-meta">4 prompt</span>
        </button>
      </div>

      <button type="button" class="btn danger-btn hidden" id="close-all-btn">
        <span class="btn-title">Đóng hết tab đã mở</span>
        <span class="btn-meta"><span id="close-all-count">0</span> tab đang theo dõi</span>
      </button>
    </div>

    <div id="status" class="status" role="status" aria-live="polite" aria-atomic="true"></div>

    <footer class="footer">
      <span>Gemini Prompt Opener v1.5.1</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
